backend:
  name: github
  repo: ungarojd-dev/peptide-site
  branch: main

media_folder: "blog/images"
public_folder: "/blog/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description (for SEO)", name: "description", widget: "string" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Author", name: "author", widget: "string", default: "MyPeptidePrice Team" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Vendor Reviews"
          - "Price Comparisons"
          - "Research Guides"
          - "Testing Standards"
          - "Industry News"
      - { label: "Body", name: "body", widget: "markdown" }
