<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyPeptidePrice Blog Admin</title>
  <script>
    // Handle invite and recovery tokens before anything else loads
    // Netlify Identity needs the token in the URL hash when it initializes
    if (window.location.hash && (
      window.location.hash.includes('invite_token') ||
      window.location.hash.includes('recovery_token') ||
      window.location.hash.includes('confirmation_token')
    )) {
      // Token is already in the URL - Decap CMS will handle it
      console.log('Token found in URL, CMS will handle it');
    }
  </script>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
