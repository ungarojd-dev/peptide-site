<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="robots" content="noindex,nofollow"/><title>Catalog Status | MyPeptidePrice.com</title><link rel="stylesheet" href="/assets/site.css"/></head><body class="status-page"><div class="status-panel"><h1>Catalog status</h1><p>Enter the private <code>CATALOG_REFRESH_TOKEN</code> value to inspect diagnostics or trigger a refresh.</p><div class="status-actions"><input id="token" type="password" placeholder="Private refresh token"/><button id="inspect">Inspect diagnostics</button><button id="refresh">Refresh now</button></div><pre id="output">No request sent.</pre></div><script>const token=document.getElementById('token'),output=document.getElementById('output');async function request(url,method='GET'){output.textContent='Loading...';try{const response=await fetch(url,{method,headers:{'x-catalog-refresh-token':token.value}});const data=await response.json();output.textContent=JSON.stringify(data,null,2)}catch(error){output.textContent=error.message}}document.getElementById('inspect').onclick=()=>request('/.netlify/functions/catalog-diagnostics');document.getElementById('refresh').onclick=()=>request('/.netlify/functions/catalog-refresh-now','POST');</script></body></html>
