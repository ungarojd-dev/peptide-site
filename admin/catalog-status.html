<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="robots" content="noindex,nofollow"/><title>Catalog Status | MyPeptidePrice.com</title><link rel="stylesheet" href="/assets/site.css?v=20260721-instant-b3g1-v3"/></head><body class="status-page"><div class="status-panel"><h1>Catalog status</h1><p>Enter the private <code>CATALOG_REFRESH_TOKEN</code> value to inspect diagnostics or trigger a refresh.</p><div class="status-actions"><input id="token" type="password" placeholder="Private refresh token"/><button id="inspect">Inspect diagnostics</button><button id="refresh">Refresh now</button></div><p id="hint">No request sent.</p><pre id="output">No request sent.</pre></div><script>
const token=document.getElementById('token'),output=document.getElementById('output'),hint=document.getElementById('hint'),refreshButton=document.getElementById('refresh');let pollTimer=null;
function render(data){output.textContent=JSON.stringify(data,null,2);const state=data?.refresh_status?.state;if(state==='queued')hint.textContent='Refresh queued. Waiting for the background worker to start...';else if(state==='running')hint.textContent='Refresh running in the background. This page will update automatically.';else if(state==='complete')hint.textContent='Last background refresh completed successfully.';else if(state==='error')hint.textContent='The latest background refresh failed. The previous successful catalog snapshot remains active.';else if(state==null)hint.textContent='No tracked background refresh has run yet. Click Refresh now once to queue the first job.';else hint.textContent='Diagnostics loaded.';return state}
async function request(url,method='GET'){const response=await fetch(url,{method,headers:{'x-catalog-refresh-token':token.value}});const text=await response.text();let data;try{data=JSON.parse(text)}catch{throw new Error(text||`HTTP ${response.status}`)}if(!response.ok&&response.status!==202)throw new Error(data.error||data.errorMessage||`HTTP ${response.status}`);return data}
async function inspect(){try{hint.textContent='Loading diagnostics...';render(await request('/.netlify/functions/catalog-diagnostics'))}catch(error){hint.textContent='Request failed.';output.textContent=error.message}}
function stopPolling(){if(pollTimer){clearTimeout(pollTimer);pollTimer=null}refreshButton.disabled=false}
async function poll(){try{const data=await request('/.netlify/functions/catalog-diagnostics');const state=render(data);if(state==='queued'||state==='running'){pollTimer=setTimeout(poll,3000)}else stopPolling()}catch(error){hint.textContent='Unable to check refresh progress. The previous successful snapshot remains active.';output.textContent=error.message;stopPolling()}}
async function refresh(){stopPolling();refreshButton.disabled=true;hint.textContent='Starting background refresh...';try{const data=await request('/.netlify/functions/catalog-refresh-now','POST');render(data);pollTimer=setTimeout(poll,1500)}catch(error){hint.textContent='Unable to start refresh. The previous successful snapshot remains active.';output.textContent=error.message;stopPolling()}}
document.getElementById('inspect').onclick=inspect;refreshButton.onclick=refresh;
</script></body></html>
