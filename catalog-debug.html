<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>MPP Catalog Debug</title>
  <style>
    :root{font-family:Inter,Arial,sans-serif;color:#13231b;background:#f5f1e8}
    body{margin:0;padding:24px}h1{margin:0 0 8px}.muted{color:#5c6d65}.panel{background:#fff;border:1px solid #ded8cc;border-radius:14px;padding:16px;margin:16px 0;overflow:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.stat{background:#f8f6f0;border-radius:10px;padding:12px}.stat b{display:block;font-size:24px}.ok{color:#1e6b45}.warn{color:#a15c00}.bad{color:#a12020}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:8px;border-bottom:1px solid #eee;vertical-align:top}button{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer;background:#183d2e;color:#fff}code{white-space:pre-wrap;font-size:12px}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}</style>
</head>
<body>
  <h1>Catalog Debug</h1>
  <p class="muted">Read-only QA page. It loads the stable snapshot, applies the catalog engine, then optionally overlays Glow and Flawless variation enrichment.</p>
  <div class="toolbar"><button id="reload">Reload data</button><span id="status" class="muted">Waiting...</span></div>
  <div class="panel"><div class="grid" id="stats"></div></div>
  <div class="panel"><h2>Vendor counts</h2><table><thead><tr><th>Vendor</th><th>Offers</th></tr></thead><tbody id="vendors"></tbody></table></div>
  <div class="panel"><h2>Uncategorized products</h2><table><thead><tr><th>Vendor</th><th>Product</th><th>Listing</th><th>SKU</th></tr></thead><tbody id="uncategorized"></tbody></table></div>
  <div class="panel"><h2>Enrichment errors</h2><code id="errors">None loaded yet.</code></div>
  <script src="assets/catalog-engine.js"></script>
  <script>
    const esc=s=>String(s??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    const status=document.getElementById("status");
    async function getJSON(url,ms=15000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);try{const r=await fetch(url,{signal:c.signal,cache:"no-store"});if(!r.ok)throw new Error(`${url}: HTTP ${r.status}`);return await r.json();}finally{clearTimeout(t)}}
    async function load(){
      status.textContent="Loading stable snapshot...";
      let snapshot={products:[]}, enrichment={products:[],errors:[]};
      try{snapshot=await getJSON("/.netlify/functions/products-snapshot?debug="+Date.now())}catch(e){status.textContent="Snapshot failed: "+e.message;status.className="bad";return}
      status.textContent="Loading optional enrichment...";
      try{enrichment=await getJSON("/.netlify/functions/catalog-enrichment?debug="+Date.now())}catch(e){enrichment={products:[],errors:[{error:e.message}]}}
      const merged=window.MPPCatalog.mergeEnrichment(snapshot.products,enrichment.products||[]);
      const d=window.MPPCatalog.diagnostics(merged);
      status.textContent=`Loaded ${d.offer_count} offers and ${d.group_count} grouped cards with engine ${d.engine_version}`;status.className="ok";
      document.getElementById("stats").innerHTML=[
        ["Snapshot rows",(snapshot.products||[]).length],
        ["Enrichment rows",(enrichment.products||[]).length],
        ["Rendered offers",d.offer_count],
        ["Grouped cards",d.group_count],
        ["Uncategorized",d.uncategorized.length]
      ].map(([k,v])=>`<div class="stat"><span>${esc(k)}</span><b>${esc(v)}</b></div>`).join("");
      document.getElementById("vendors").innerHTML=Object.entries(d.by_vendor).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("");
      document.getElementById("uncategorized").innerHTML=d.uncategorized.map(x=>`<tr><td>${esc(x.company)}</td><td>${esc(x.product)}</td><td>${esc(x.listing)}</td><td>${esc(x.sku)}</td></tr>`).join("")||'<tr><td colspan="4">None</td></tr>';
      document.getElementById("errors").textContent=JSON.stringify(enrichment.errors||[],null,2);
    }
    document.getElementById("reload").addEventListener("click",load);load();
  </script>
</body>
</html>
