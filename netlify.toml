[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."refresh-catalog-snapshot"]
  schedule = "*/15 * * * *"

[functions."catalog-refresh-background"]
  background = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/data/catalog-fallback-snapshot.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=21600"

[[headers]]
  for = "/admin/catalog-status.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
