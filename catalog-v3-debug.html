<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Catalog V3 Debug | MyPeptidePrice.com</title>
<style>
:root{font-family:Arial,sans-serif;color:#1f332a;background:#f7f3ea}*{box-sizing:border-box}body{margin:0;padding:18px}h1{margin:0 0 6px}.muted{color:#6c786f}.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin:14px 0}.btn{border:0;border-radius:9px;padding:10px 12px;background:#1f3a2d;color:#fff;font-weight:800;cursor:pointer}.panel{overflow:auto;margin:12px 0;border:1px solid #e2d9ca;border-radius:13px;background:#fffdf8;padding:13px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.stat{border-radius:10px;background:#f3f0e8;padding:10px}.stat b{display:block;margin-top:3px;font-size:24px}.ok{color:#236347}.warn{color:#9a6816}.bad{color:#9b4b43}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:7px;border-bottom:1px solid #eee7dc;text-align:left;vertical-align:top}code{white-space:pre-wrap;font-size:11px}
</style>
</head>
<body>
<h1>Catalog V3 Debug</h1><p class="muted">Read-only QA page for the pre-grouped catalog snapshot.</p>
<div class="toolbar"><button class="btn" id="reload">Reload data</button><a href="/catalog-v3.html">Open V3 preview</a><span class="muted" id="status">Waiting...</span></div>
<div class="panel"><div class="grid" id="stats"></div></div>
<div class="panel"><h2>Vendor feed status</h2><table><thead><tr><th>Vendor</th><th>Status</th><th>Rows</th><th>Endpoint</th><th>Error</th></tr></thead><tbody id="vendorStatus"></tbody></table></div>
<div class="panel"><h2>Normalized offer counts</h2><table><thead><tr><th>Vendor</th><th>Offers</th></tr></thead><tbody id="vendors"></tbody></table></div>
<div class="panel"><h2>Visible unmapped products</h2><table><thead><tr><th>Vendor</th><th>Raw product</th><th>Listing</th><th>Grouped as</th><th>Format</th><th>Size</th></tr></thead><tbody id="unmapped"></tbody></table></div>
<div class="panel"><h2>Refresh warnings</h2><code id="warnings">None loaded yet.</code></div>
<script>
const esc=value=>String(value==null?"":value).replace(/[&<>\"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[char]));
async function getJSON(url,ms=10000){const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),ms);try{const response=await fetch(url,{signal:ctrl.signal,cache:"no-store"});if(!response.ok)throw new Error(`${url}: HTTP ${response.status}`);return {data:await response.json(),source:response.headers.get("X-MPP-Catalog-V3-Source")||"snapshot"};}finally{clearTimeout(timer)}}
function rows(items,render,emptyCols){return items.length?items.map(render).join(""):`<tr><td colspan="${emptyCols}">None</td></tr>`}
async function load(){const status=document.getElementById("status");status.textContent="Loading diagnostics...";try{let result;try{result=await getJSON("/.netlify/functions/catalog-v3-diagnostics?debug="+Date.now())}catch(error){const fallback=await getJSON("/data/catalog-v3-fallback-snapshot.json?debug="+Date.now());result={data:{diagnostics:fallback.data.diagnostics,snapshot_updated_at:fallback.data.snapshot_updated_at,snapshot_refresh_ms:fallback.data.snapshot_refresh_ms},source:"static fallback"}}const payload=result.data||{};const d=payload.diagnostics||{};status.textContent=`Loaded ${d.normalized_offer_count||0} offers from ${result.source}`;status.className="ok";document.getElementById("stats").innerHTML=[["Cards",d.product_card_count||0],["Offers",d.normalized_offer_count||0],["Vendors",Object.keys(d.vendors||{}).length],["Visible unmapped",d.visible_unmapped_count||0],["Excluded",d.excluded_count||0],["Silent drops",d.silent_drop_count||0],["Refresh ms",payload.snapshot_refresh_ms||0]].map(([label,value])=>`<div class="stat"><span>${esc(label)}</span><b>${esc(value)}</b></div>`).join("");const vendorStatus=Object.entries(d.vendor_status||{}).sort((a,b)=>a[0].localeCompare(b[0]));document.getElementById("vendorStatus").innerHTML=rows(vendorStatus,([vendor,item])=>`<tr><td>${esc(vendor)}</td><td>${esc(item.status||"")}</td><td>${esc(item.row_count||0)}</td><td>${esc(item.path||"")}</td><td>${esc(item.error||"")}</td></tr>`,5);const vendors=Object.entries(d.vendors||{}).sort((a,b)=>b[1]-a[1]);document.getElementById("vendors").innerHTML=rows(vendors,([vendor,count])=>`<tr><td>${esc(vendor)}</td><td>${esc(count)}</td></tr>`,2);document.getElementById("unmapped").innerHTML=rows(d.unmapped_products||[],item=>`<tr><td>${esc(item.vendor)}</td><td>${esc(item.raw_product)}</td><td>${esc(item.raw_listing)}</td><td>${esc(item.grouped_as)}</td><td>${esc(item.format)}</td><td>${esc(item.quantity)}</td></tr>`,6);document.getElementById("warnings").textContent=JSON.stringify(d.warnings||[],null,2);}catch(error){status.textContent="Diagnostics failed: "+error.message;status.className="bad"}}
document.getElementById("reload").onclick=load;load();
</script>
</body>
</html>
